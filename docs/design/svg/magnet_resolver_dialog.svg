<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 对话框背景 -->
  <rect width="600" height="500" fill="#34495E" stroke="#7F8C8D" stroke-width="2" rx="8"/>
  
  <!-- 标题栏 -->
  <rect x="0" y="0" width="600" height="40" fill="#2C3E50" rx="8"/>
  <rect x="0" y="32" width="600" height="8" fill="#2C3E50"/>
  <text x="20" y="26" fill="#ECF0F1" font-family="Arial" font-size="16" font-weight="bold">🔍 Resolving Magnet Link</text>
  <rect x="560" y="8" width="24" height="24" fill="#E74C3C" rx="4"/>
  <text x="572" y="24" fill="white" font-family="Arial" font-size="14" text-anchor="middle">✕</text>
  
  <!-- 磁力链接输入框 -->
  <text x="20" y="70" fill="#ECF0F1" font-family="Arial" font-size="14" font-weight="bold">Magnet Link:</text>
  <rect x="20" y="80" width="560" height="32" fill="#2C3E50" stroke="#7F8C8D" stroke-width="1" rx="4"/>
  <text x="28" y="100" fill="#BDC3C7" font-family="Arial" font-size="12">magnet:?xt=urn:btih:1234567890abcdef1234567890abcdef12345678&amp;dn=Ubuntu...</text>
  
  <!-- 解析进度 -->
  <text x="20" y="140" fill="#ECF0F1" font-family="Arial" font-size="14" font-weight="bold">📊 Resolving Progress:</text>
  <rect x="20" y="150" width="560" height="20" fill="#7F8C8D" rx="10"/>
  <rect x="20" y="150" width="476" height="20" fill="#3498DB" rx="10"/>
  <text x="300" y="164" fill="white" font-family="Arial" font-size="12" text-anchor="middle">85%</text>
  
  <!-- 网络状态面板 -->
  <text x="20" y="200" fill="#ECF0F1" font-family="Arial" font-size="14" font-weight="bold">📡 Network Status:</text>
  <rect x="20" y="210" width="560" height="100" fill="#2C3E50" stroke="#7F8C8D" stroke-width="1" rx="4"/>
  
  <g transform="translate(32, 230)">
    <text x="0" y="16" fill="#27AE60" font-family="Arial" font-size="12">🔍 Found 12 Peers</text>
    <text x="0" y="36" fill="#3498DB" font-family="Arial" font-size="12">📡 DHT Nodes: 1,247 active</text>
    <text x="0" y="56" fill="#F39C12" font-family="Arial" font-size="12">🌐 Trackers: 3/5 responding</text>
    <text x="0" y="76" fill="#ECF0F1" font-family="Arial" font-size="12">⏱️ Estimated time: 15 seconds</text>
  </g>
  
  <!-- 日志面板 -->
  <text x="20" y="340" fill="#ECF0F1" font-family="Arial" font-size="14" font-weight="bold">📝 Log:</text>
  <rect x="20" y="350" width="560" height="100" fill="#2C3E50" stroke="#7F8C8D" stroke-width="1" rx="4"/>
  
  <g transform="translate(28, 370)" font-family="Consolas, monospace" font-size="11">
    <text x="0" y="12" fill="#BDC3C7">[14:30:25] Starting magnet link resolution...</text>
    <text x="0" y="28" fill="#3498DB">[14:30:26] Connecting to DHT network...</text>
    <text x="0" y="44" fill="#27AE60">[14:30:28] Found 5 peers</text>
    <text x="0" y="60" fill="#F39C12">[14:30:30] Fetching metadata...</text>
    <text x="0" y="76" fill="#3498DB">[14:30:32] Metadata progress: 85%</text>
  </g>
  
  <!-- 取消按钮 -->
  <rect x="500" y="460" width="80" height="32" fill="#E74C3C" rx="4"/>
  <text x="540" y="480" fill="white" font-family="Arial" font-size="12" text-anchor="middle">Cancel</text>
  
  <!-- 加载动画指示器 -->
  <g transform="translate(540, 140)">
    <circle cx="20" cy="10" r="8" fill="none" stroke="#3498DB" stroke-width="2" stroke-dasharray="25.13" stroke-dashoffset="6.28">
      <animateTransform attributeName="transform" type="rotate" values="0 20 10;360 20 10" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>