<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1400" height="1000" fill="#2C3E50"/>
  
  <!-- 标题 -->
  <text x="700" y="40" fill="#ECF0F1" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">MagnetDownload User Workflow</text>
  
  <!-- 步骤1: 主界面 -->
  <g transform="translate(50, 80)">
    <rect width="300" height="200" fill="#34495E" stroke="#3498DB" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#3498DB" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">1. Main Window</text>
    
    <!-- 简化的主界面 -->
    <rect x="10" y="30" width="280" height="20" fill="#2C3E50" rx="2"/>
    <text x="20" y="44" fill="#ECF0F1" font-family="Arial" font-size="10">🧲 MagnetDownload v2.0</text>
    
    <rect x="10" y="60" width="280" height="24" fill="#7F8C8D" rx="2"/>
    <text x="20" y="76" fill="#BDC3C7" font-family="Arial" font-size="9">magnet:?xt=urn:btih:...</text>
    <rect x="240" y="64" width="40" height="16" fill="#3498DB" rx="2"/>
    <text x="260" y="74" fill="white" font-family="Arial" font-size="8" text-anchor="middle">Parse</text>
    
    <rect x="10" y="94" width="280" height="80" fill="#2C3E50" rx="2"/>
    <text x="20" y="108" fill="#ECF0F1" font-family="Arial" font-size="9">Download Queue</text>
    <rect x="20" y="115" width="260" height="12" fill="#27AE60" rx="6"/>
    <text x="150" y="123" fill="white" font-family="Arial" font-size="7" text-anchor="middle">Ubuntu ISO - 80%</text>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">User enters magnet link</text>
  </g>
  
  <!-- 箭头1 -->
  <path d="M 370 180 L 420 180" stroke="#F39C12" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="395" y="175" fill="#F39C12" font-family="Arial" font-size="10" text-anchor="middle">Click Parse</text>
  
  <!-- 步骤2: 解析对话框 -->
  <g transform="translate(450, 80)">
    <rect width="300" height="200" fill="#34495E" stroke="#F39C12" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#F39C12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">2. Magnet Resolver</text>
    
    <!-- 简化的解析界面 -->
    <rect x="10" y="30" width="280" height="16" fill="#2C3E50" rx="2"/>
    <text x="20" y="42" fill="#BDC3C7" font-family="Arial" font-size="8">magnet:?xt=urn:btih:1234...</text>
    
    <text x="20" y="60" fill="#ECF0F1" font-family="Arial" font-size="9">📊 Progress:</text>
    <rect x="20" y="65" width="260" height="12" fill="#7F8C8D" rx="6"/>
    <rect x="20" y="65" width="208" height="12" fill="#3498DB" rx="6"/>
    <text x="150" y="73" fill="white" font-family="Arial" font-size="7" text-anchor="middle">80%</text>
    
    <rect x="10" y="85" width="280" height="60" fill="#2C3E50" rx="2"/>
    <text x="20" y="100" fill="#27AE60" font-family="Arial" font-size="8">🔍 Found 12 Peers</text>
    <text x="20" y="115" fill="#3498DB" font-family="Arial" font-size="8">📡 DHT: 1,247 nodes</text>
    <text x="20" y="130" fill="#F39C12" font-family="Arial" font-size="8">🌐 Trackers: 3/5 OK</text>
    
    <rect x="10" y="155" width="280" height="20" fill="#2C3E50" rx="2"/>
    <text x="20" y="167" fill="#BDC3C7" font-family="Arial" font-size="7">[14:30:32] Metadata: 80%</text>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Resolving metadata...</text>
  </g>
  
  <!-- 箭头2 -->
  <path d="M 770 180 L 820 180" stroke="#27AE60" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="795" y="175" fill="#27AE60" font-family="Arial" font-size="10" text-anchor="middle">Complete</text>
  
  <!-- 步骤3: 文件选择 -->
  <g transform="translate(850, 80)">
    <rect width="300" height="200" fill="#34495E" stroke="#27AE60" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#27AE60" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">3. File Selector</text>
    
    <!-- 简化的文件选择界面 -->
    <rect x="10" y="30" width="280" height="40" fill="#2C3E50" rx="2"/>
    <text x="20" y="44" fill="#ECF0F1" font-family="Arial" font-size="8">📝 Ubuntu 22.04.3 Desktop</text>
    <text x="20" y="56" fill="#ECF0F1" font-family="Arial" font-size="8">📏 Size: 4.7 GB, 3 files</text>
    
    <rect x="10" y="80" width="280" height="80" fill="#2C3E50" rx="2"/>
    <text x="20" y="94" fill="#ECF0F1" font-family="Arial" font-size="8">📁 File List:</text>
    
    <rect x="20" y="100" width="12" height="12" fill="#27AE60" rx="2"/>
    <text x="38" y="109" fill="#ECF0F1" font-family="Arial" font-size="7">📀 ubuntu.iso (4.7GB)</text>
    
    <rect x="20" y="118" width="12" height="12" fill="#27AE60" rx="2"/>
    <text x="38" y="127" fill="#ECF0F1" font-family="Arial" font-size="7">📄 README.txt (2KB)</text>
    
    <rect x="20" y="136" width="12" height="12" fill="#7F8C8D" rx="2"/>
    <text x="38" y="145" fill="#7F8C8D" font-family="Arial" font-size="7">📄 CHECKSUM.md5</text>
    
    <rect x="180" y="140" width="100" height="16" fill="#27AE60" rx="4"/>
    <text x="230" y="150" fill="white" font-family="Arial" font-size="8" text-anchor="middle">Start Download</text>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Select files to download</text>
  </g>
  
  <!-- 箭头3 (向下) -->
  <path d="M 1000 300 L 1000 350" stroke="#9B59B6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1020" y="325" fill="#9B59B6" font-family="Arial" font-size="10">Start</text>
  
  <!-- 步骤4: 下载进行中 -->
  <g transform="translate(850, 380)">
    <rect width="300" height="200" fill="#34495E" stroke="#9B59B6" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#9B59B6" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">4. Download Active</text>
    
    <!-- 简化的下载界面 -->
    <rect x="10" y="30" width="280" height="60" fill="#2C3E50" rx="2"/>
    <text x="20" y="44" fill="#ECF0F1" font-family="Arial" font-size="8">📁 Ubuntu 22.04 ISO</text>
    <rect x="20" y="50" width="200" height="12" fill="#7F8C8D" rx="6"/>
    <rect x="20" y="50" width="160" height="12" fill="#27AE60" rx="6"/>
    <text x="120" y="58" fill="white" font-family="Arial" font-size="7" text-anchor="middle">80%</text>
    <text x="230" y="58" fill="#27AE60" font-family="Arial" font-size="7">5.2MB/s</text>
    
    <text x="20" y="78" fill="#3498DB" font-family="Arial" font-size="8">👥 32 peers, ⏱️ 2m left</text>
    
    <rect x="10" y="100" width="280" height="70" fill="#2C3E50" rx="2"/>
    <text x="20" y="114" fill="#ECF0F1" font-family="Arial" font-size="8">📊 Details:</text>
    <text x="20" y="128" fill="#ECF0F1" font-family="Arial" font-size="7">⬇️ 5.2 MB/s  ⬆️ 1.1 MB/s</text>
    <text x="20" y="142" fill="#ECF0F1" font-family="Arial" font-size="7">📥 Downloaded: 3.78 GB</text>
    <text x="20" y="156" fill="#ECF0F1" font-family="Arial" font-size="7">🎯 Progress: 2,418 pieces</text>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Download in progress</text>
  </g>
  
  <!-- 箭头4 (向左) -->
  <path d="M 830 480 L 780 480" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="805" y="475" fill="#E67E22" font-family="Arial" font-size="10" text-anchor="middle">View Details</text>
  
  <!-- 步骤5: 详细信息 -->
  <g transform="translate(450, 380)">
    <rect width="300" height="200" fill="#34495E" stroke="#E67E22" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#E67E22" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">5. Download Details</text>
    
    <!-- 标签页 -->
    <g transform="translate(20, 30)">
      <rect x="0" y="0" width="50" height="16" fill="#3498DB" rx="2"/>
      <text x="25" y="11" fill="white" font-family="Arial" font-size="7" text-anchor="middle">General</text>
      <rect x="55" y="0" width="40" height="16" fill="#2C3E50" rx="2"/>
      <text x="75" y="11" fill="#ECF0F1" font-family="Arial" font-size="7" text-anchor="middle">Files</text>
      <rect x="100" y="0" width="40" height="16" fill="#2C3E50" rx="2"/>
      <text x="120" y="11" fill="#ECF0F1" font-family="Arial" font-size="7" text-anchor="middle">Peers</text>
    </g>
    
    <!-- 进度概览 -->
    <rect x="10" y="55" width="280" height="40" fill="#2C3E50" rx="2"/>
    <rect x="20" y="65" width="240" height="8" fill="#7F8C8D" rx="4"/>
    <rect x="20" y="65" width="192" height="8" fill="#27AE60" rx="4"/>
    <text x="140" y="71" fill="white" font-family="Arial" font-size="6" text-anchor="middle">80.5%</text>
    <text x="20" y="85" fill="#ECF0F1" font-family="Arial" font-size="7">⬇️ 5.2MB/s  ⬆️ 1.1MB/s  👥 32/50</text>
    
    <!-- 分片地图 -->
    <rect x="10" y="105" width="280" height="50" fill="#2C3E50" rx="2"/>
    <text x="20" y="118" fill="#ECF0F1" font-family="Arial" font-size="8">🎯 Piece Map:</text>
    <rect x="20" y="125" width="200" height="6" fill="#3498DB" rx="3"/>
    <rect x="220" y="125" width="30" height="6" fill="#F39C12" rx="3"/>
    <rect x="250" y="125" width="20" height="6" fill="#7F8C8D" rx="3"/>
    
    <rect x="20" y="135" width="210" height="6" fill="#3498DB" rx="3"/>
    <rect x="230" y="135" width="40" height="6" fill="#7F8C8D" rx="3"/>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Detailed progress view</text>
  </g>
  
  <!-- 箭头5 (向左) -->
  <path d="M 430 480 L 380 480" stroke="#E74C3C" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="405" y="475" fill="#E74C3C" font-family="Arial" font-size="10" text-anchor="middle">Peers</text>
  
  <!-- 步骤6: Peers视图 -->
  <g transform="translate(50, 380)">
    <rect width="300" height="200" fill="#34495E" stroke="#E74C3C" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#E74C3C" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">6. Peers View</text>
    
    <!-- 连接统计 -->
    <rect x="10" y="30" width="280" height="30" fill="#2C3E50" rx="2"/>
    <text x="20" y="44" fill="#ECF0F1" font-family="Arial" font-size="8">Total: 45/50  🟢 32  🟡 8  🔴 5</text>
    <text x="20" y="54" fill="#ECF0F1" font-family="Arial" font-size="8">📤 1.1MB/s  📥 5.2MB/s</text>
    
    <!-- Peers列表 -->
    <rect x="10" y="70" width="280" height="100" fill="#2C3E50" rx="2"/>
    <text x="20" y="84" fill="#ECF0F1" font-family="Arial" font-size="8">👥 Peer Connections:</text>
    
    <g transform="translate(20, 90)" font-family="Arial" font-size="7">
      <circle cx="4" cy="4" r="3" fill="#27AE60"/>
      <text x="12" y="7" fill="#ECF0F1">192.168.1.100 - qBittorrent</text>
      <text x="200" y="7" fill="#27AE60">1.2MB/s</text>
      
      <circle cx="4" cy="16" r="3" fill="#27AE60"/>
      <text x="12" y="19" fill="#ECF0F1">203.0.113.45 - Transmission</text>
      <text x="200" y="19" fill="#27AE60">0.8MB/s</text>
      
      <circle cx="4" cy="28" r="3" fill="#F39C12"/>
      <text x="12" y="31" fill="#ECF0F1">172.16.0.200 - BitComet</text>
      <text x="200" y="31" fill="#F39C12">Connecting</text>
      
      <circle cx="4" cy="40" r="3" fill="#E74C3C"/>
      <text x="12" y="43" fill="#7F8C8D">203.0.113.100 - Failed</text>
      <text x="200" y="43" fill="#E74C3C">Timeout</text>
    </g>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Monitor peer connections</text>
  </g>
  
  <!-- 箭头6 (向下到设置) -->
  <path d="M 200 600 L 200 650" stroke="#8E44AD" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="220" y="625" fill="#8E44AD" font-family="Arial" font-size="10">Settings</text>
  
  <!-- 步骤7: 设置 -->
  <g transform="translate(50, 680)">
    <rect width="300" height="200" fill="#34495E" stroke="#8E44AD" stroke-width="2" rx="8"/>
    <text x="150" y="20" fill="#8E44AD" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">7. Settings</text>
    
    <!-- 左侧导航 -->
    <rect x="10" y="30" width="80" height="140" fill="#2C3E50" rx="2"/>
    <g transform="translate(15, 40)" font-family="Arial" font-size="7">
      <rect x="0" y="0" width="70" height="12" fill="#3498DB" rx="2"/>
      <text x="35" y="8" fill="white" text-anchor="middle">📂 General</text>
      <text x="5" y="22" fill="#ECF0F1">🌐 Connection</text>
      <text x="5" y="34" fill="#ECF0F1">⚡ Speed</text>
      <text x="5" y="46" fill="#ECF0F1">📁 Downloads</text>
      <text x="5" y="58" fill="#ECF0F1">🔒 Privacy</text>
      <text x="5" y="70" fill="#ECF0F1">🎨 Interface</text>
      <text x="5" y="82" fill="#ECF0F1">🔧 Advanced</text>
    </g>
    
    <!-- 右侧设置内容 -->
    <rect x="100" y="30" width="190" height="140" fill="#2C3E50" rx="2"/>
    <text x="110" y="44" fill="#ECF0F1" font-family="Arial" font-size="8">🌐 Connection Settings</text>
    
    <text x="110" y="60" fill="#ECF0F1" font-family="Arial" font-size="7">Listening Port:</text>
    <rect x="110" y="65" width="40" height="12" fill="#34495E" rx="2"/>
    <text x="130" y="73" fill="#ECF0F1" font-family="Arial" font-size="6" text-anchor="middle">6881</text>
    
    <text x="110" y="85" fill="#ECF0F1" font-family="Arial" font-size="7">Max Connections:</text>
    <rect x="110" y="90" width="40" height="12" fill="#34495E" rx="2"/>
    <text x="130" y="98" fill="#ECF0F1" font-family="Arial" font-size="6" text-anchor="middle">200</text>
    
    <text x="110" y="115" fill="#ECF0F1" font-family="Arial" font-size="7">🔒 Proxy Settings:</text>
    <rect x="110" y="125" width="12" height="12" fill="none" stroke="#7F8C8D" stroke-width="1" rx="2"/>
    <text x="128" y="133" fill="#BDC3C7" font-family="Arial" font-size="6">Enable proxy</text>
    
    <rect x="200" y="150" width="40" height="12" fill="#27AE60" rx="2"/>
    <text x="220" y="158" fill="white" font-family="Arial" font-size="6" text-anchor="middle">Apply</text>
    
    <text x="150" y="190" fill="#BDC3C7" font-family="Arial" font-size="10" text-anchor="middle">Configure application</text>
  </g>
  
  <!-- 工作流程说明 -->
  <g transform="translate(450, 680)">
    <rect width="500" height="200" fill="#34495E" stroke="#ECF0F1" stroke-width="1" rx="8"/>
    <text x="250" y="25" fill="#ECF0F1" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Complete User Workflow</text>
    
    <g transform="translate(20, 40)" font-family="Arial" font-size="12">
      <text x="0" y="16" fill="#3498DB">1. Main Window</text>
      <text x="20" y="32" fill="#ECF0F1" font-size="10">• User enters magnet link in input field</text>
      <text x="20" y="46" fill="#ECF0F1" font-size="10">• Clicks "Parse" button to start resolution</text>
      
      <text x="0" y="66" fill="#F39C12">2. Magnet Resolver</text>
      <text x="20" y="82" fill="#ECF0F1" font-size="10">• Shows real-time parsing progress</text>
      <text x="20" y="96" fill="#ECF0F1" font-size="10">• Displays network status and peer discovery</text>
      
      <text x="0" y="116" fill="#27AE60">3. File Selector</text>
      <text x="20" y="132" fill="#ECF0F1" font-size="10">• Lists all files in the torrent</text>
      <text x="20" y="146" fill="#ECF0F1" font-size="10">• User selects files and sets priorities</text>
      
      <text x="250" y="16" fill="#9B59B6">4. Download Active</text>
      <text x="270" y="32" fill="#ECF0F1" font-size="10">• Real-time download progress</text>
      <text x="270" y="46" fill="#ECF0F1" font-size="10">• Speed monitoring and ETA</text>
      
      <text x="250" y="66" fill="#E67E22">5. Download Details</text>
      <text x="270" y="82" fill="#ECF0F1" font-size="10">• Detailed progress visualization</text>
      <text x="270" y="96" fill="#ECF0F1" font-size="10">• Piece map and speed charts</text>
      
      <text x="250" y="116" fill="#E74C3C">6. Peers View</text>
      <text x="270" y="132" fill="#ECF0F1" font-size="10">• Monitor peer connections</text>
      <text x="270" y="146" fill="#ECF0F1" font-size="10">• Geographic distribution</text>
      
      <text x="125" y="176" fill="#8E44AD">7. Settings - Configure all application preferences</text>
    </g>
  </g>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F39C12"/>
    </marker>
  </defs>
</svg>